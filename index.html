<div class="card" style="margin-top: 20px; text-align: right; background: rgba(15, 23, 42, 0.8);">
    <h3 style="color: var(--sona-blue); font-size: 0.9rem;">⚙️ إعدادات الربط المباشر</h3>
    <input type="text" id="igg_id" placeholder="أدخل رقم IGG ID" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0b0e14; color: white;">
    <input type="text" id="server_id" placeholder="أدخل رقم السيرفر (Server ID)" style="width: 90%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0b0e14; color: white;">
    <button onclick="saveSettings()" style="margin-top: 10px; background: var(--success); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer;">حفظ وربط</button>
</div>

<script>
    function saveSettings() {
        const igg = document.getElementById('igg_id').value;
        const sid = document.getElementById('server_id').value;
        if(igg && sid) {
            tg.sendData(`ربط:${igg}:${sid}`);
            alert("تم إرسال بيانات الربط لـ Termux");
        } else {
            alert("يرجى إدخال البيانات كاملة");
        }
    }
</script>
