<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mido Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1e293b; padding: 2rem; border-radius: 1.5rem; text-align: center; width: 85%; border: 2px solid #3b82f6; }
        h2 { color: #3b82f6; }
        button { background-color: #3b82f6; color: white; border: none; padding: 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 1.5rem; font-size: 1.1rem; }
        button:active { transform: scale(0.98); background-color: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>لوحة تحكم Mido</h2>
        <p>مرحباً بك في نظام الإدارة</p>
        <button onclick="sendAttack()">⚔️ إرسال أمر هجوم</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendAttack() {
            // إرسال البيانات للبوت في Termux
            tg.sendData("بدء الهجوم الآن");
        }
    </script>
</body>
</html>
