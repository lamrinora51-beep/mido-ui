<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mido Sona Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #22c55e; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🔗 ربط القلعة الآمن</h2>
    <div class="input-group">
        <label>رقم IGG ID:</label>
        <input type="number" id="igg_id" placeholder="أدخل رقم IGG">
    </div>
    <div class="input-group">
        <label>رقم السيرفر:</label>
        <input type="number" id="server_id" placeholder="أدخل رقم السيرفر">
    </div>
    <button onclick="sendToBot()">تفعيل الربط الآن</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendToBot() {
            const igg = document.getElementById('igg_id').value;
            const sid = document.getElementById('server_id').value;

            if (igg && sid) {
                // إرسال البيانات بصيغة يفهمها البوت
                tg.sendData("BIND_SECURE:" + igg + ":" + sid);
                tg.close(); // إغلاق الواجهة بعد الإرسال
            } else {
                alert("يرجى إكمال البيانات");
            }
        }
    </script>
</body>
</html>
