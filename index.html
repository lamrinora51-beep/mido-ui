<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mido Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1e293b; padding: 2.5rem; border-radius: 1.5rem; text-align: center; width: 85%; border: 2px solid #3b82f6; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #3b82f6; margin-bottom: 20px; }
        button { background-color: #3b82f6; color: white; border: none; padding: 1.2rem; border-radius: 0.8rem; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2rem; transition: 0.3s; }
        button:active { transform: scale(0.95); background-color: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام Mido للإدارة</h2>
        <p>اضغط للبدء فوراً</p>
        <button onclick="executeAction()">⚔️ إرسال أمر هجوم</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function executeAction() {
            // إرسال النص للبوت وإغلاق النافذة
            tg.sendData("بدء الهجوم الآن");
        }
    </script>
</body>
</html>
